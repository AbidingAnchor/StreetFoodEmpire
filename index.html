<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ea580c" />
    <meta name="description" content="Build your street food empire — serve customers, earn coins, unlock new spots." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Street Food Empire" />
    <title>Street Food Empire</title>
  </head>
  <body>
    <div id="app" class="flex min-h-svh flex-col bg-gradient-to-b from-orange-600 via-amber-500 to-orange-700 font-sans text-amber-50">
      <header
        class="shrink-0 border-b border-amber-400/40 bg-gradient-to-r from-red-900/92 to-orange-900/92 px-4 py-3 shadow-lg backdrop-blur-md"
      >
        <div class="mx-auto flex max-w-lg flex-col items-center gap-0.5 text-center">
          <span class="text-xs font-semibold uppercase tracking-widest text-amber-200/90">Coins</span>
          <p
            id="hud-coins"
            class="text-4xl font-extrabold tracking-tight text-yellow-200 drop-shadow-md sm:text-5xl"
          >
            🪙 0
          </p>
          <p class="text-sm font-bold text-amber-100/95">
            <span class="text-amber-200/80">per second</span>
            <span id="hud-rate" class="ml-2 text-lg text-amber-50">+0.00/s</span>
          </p>
        </div>
      </header>

      <div id="game-container" class="relative min-h-0 w-full flex-1 overflow-hidden"></div>

      <footer
        class="shrink-0 border-t border-amber-400/35 bg-gradient-to-r from-orange-950/95 to-red-950/95 px-3 py-2 backdrop-blur-md"
      >
        <nav class="mx-auto flex max-w-lg justify-center gap-2" aria-label="Locations">
          <button
            type="button"
            id="tab-hotdog"
            class="tab-btn rounded-2xl px-4 py-2.5 text-sm font-bold shadow-md ring-amber-300 transition hover:brightness-110 active:scale-[0.98]"
          >
            🌭 Hot Dog Cart
          </button>
          <button
            type="button"
            id="tab-taco"
            disabled
            class="tab-btn rounded-2xl px-4 py-2.5 text-sm font-bold shadow-md opacity-35 ring-amber-300 transition enabled:hover:brightness-110 enabled:active:scale-[0.98] disabled:cursor-not-allowed"
          >
            🌮 Taco Stand
          </button>
        </nav>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
